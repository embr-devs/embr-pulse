platform: nodejs
platformVersion: "20"
autoDeploy: true

run:
  port: 3000
  startCommand: "npm start"

healthCheck:
  enabled: true
  path: "/api/health"
  expectedStatusCode: 200

# NOTE: Embr-managed DB is temporarily disabled — platform's DB tunnel install
# is failing in our region (see docs/platform-gaps.md G-006). Using an external
# Azure Postgres Flexible Server connected via `embr dbs connect` until
# platform team unblocks. To re-enable later, restore this block:
#
# database:
#   enabled: true
#   engine: postgres
#   framework: raw
#   schema: db/schema.sql
